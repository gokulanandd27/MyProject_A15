name: Flask CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3

    - name: Set up Python 3.9
      uses: actions/setup-python@v3
      with:
        python-version: "3.9"

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        # Install test dependencies if any (e.g., pytest, flake8)
        # pip install pytest

    - name: Run Verification Script
      run: |
        # We can't easily run full integration tests that require a running server in a simple CI job
        # without services, but we can run unit tests or simple scripts.
        # For now, let's just checking if the code imports correctly by running a simple check or the model test.
        python verify_xlm_roberta.py
