<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Chat</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <!-- Google Fonts for a premium look -->
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="chat-container">
        <div class="chat-header">
            <div class="header-content">
                <span>Top Chat</span>
                <span class="live-indicator">● LIVE</span>
            </div>
        </div>
        
        <div class="chat-messages" id="chat-messages">
            <!-- Messages will appear here -->
            <div class="welcome-message">Welcome to the live chat! Remember to guard your privacy and abide by our community guidelines.</div>
        </div>
        
        <div class="chat-input-area">
            <div class="user-avatar-placeholder">
                <!-- Simple avatar circle -->
                <span>U</span>
            </div>
            <div class="input-wrapper">
                <input type="text" id="message-input" placeholder="Chat..." maxlength="200" autocomplete="off">
                <div class="input-actions">
                    <span class="char-count" id="char-count">0/200</span>
                    <button id="send-btn" disabled>
                        <svg viewBox="0 0 24 24" preserveAspectRatio="xMidYMid meet" focusable="false" style="pointer-events: none; display: block; width: 100%; height: 100%;"><g class="style-scope yt-icon"><path d="M2,21L23,12L2,3V10L17,12L2,14V21Z" class="style-scope yt-icon"></path></g></svg>
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
